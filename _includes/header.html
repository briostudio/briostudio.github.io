<!-- ==================== HEADER ==================== -->
<header class="fixed top-0 left-0 right-0 z-50 bg-header backdrop-blur-xl border-b border-subtle transition-colors duration-300">
  <nav class="max-w-[1200px] mx-auto px-6 flex items-center justify-between h-16">

    <!-- Logo -->
    <a href="{{ '/' | relative_url }}" class="flex items-center gap-1.5 no-underline text-primary">
      <span class="font-heading font-bold text-xl tracking-tight bg-gradient-accent text-white px-2 py-0.5 rounded">brio</span>
      <span class="font-heading font-semibold text-lg tracking-tight text-muted">.studio</span>
    </a>

    <!-- Desktop nav -->
    <div class="hidden md:flex items-center gap-8">
      <a href="#approach" class="text-sm font-medium text-secondary hover:text-primary nav-underline transition-colors">Approach</a>
      <a href="#services" class="text-sm font-medium text-secondary hover:text-primary nav-underline transition-colors">Services</a>
      <a href="#values"   class="text-sm font-medium text-secondary hover:text-primary nav-underline transition-colors">Values</a>
      <a href="#team"     class="text-sm font-medium text-secondary hover:text-primary nav-underline transition-colors">Team</a>
      <a href="#contact"  class="text-sm font-medium btn-gradient text-white px-5 py-2 rounded-full">Let's Talk</a>

      <!-- Theme toggle -->
      <button id="theme-toggle" aria-label="Toggle dark mode"
        class="flex items-center justify-center w-9 h-9 rounded-full border border-theme bg-surface text-secondary hover:border-accent-l hover:text-accent hover:bg-accent-s transition-all cursor-pointer ml-1">
        <svg class="hidden dark:block w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg class="block dark:hidden w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>

    <!-- Mobile hamburger -->
    <button id="mobile-menu-toggle" aria-label="Toggle menu"
      class="flex md:hidden flex-col justify-center gap-[5px] w-9 h-9 p-1.5 bg-transparent border-none cursor-pointer hamburger">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- Mobile menu -->
  <div id="mobile-menu" class="hidden flex-col gap-4 px-6 py-6 bg-primary border-b border-theme md:hidden">
    <a href="#approach" class="text-base font-medium text-secondary hover:text-accent py-2 border-b border-subtle transition-colors">Approach</a>
    <a href="#services" class="text-base font-medium text-secondary hover:text-accent py-2 border-b border-subtle transition-colors">Services</a>
    <a href="#values"   class="text-base font-medium text-secondary hover:text-accent py-2 border-b border-subtle transition-colors">Values</a>
    <a href="#team"     class="text-base font-medium text-secondary hover:text-accent py-2 border-b border-subtle transition-colors">Team</a>
    <a href="#contact"  class="text-base font-semibold text-accent py-2 transition-colors">Let's Talk</a>
  </div>
</header>
