<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">

  {% seo %}

  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            heading: ['"Space Grotesk"', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
            body: ['"Inter"', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
          },
          colors: {
            accent: {
              DEFAULT: 'var(--color-accent)',
              hover:   'var(--color-accent-hover)',
              light:   'var(--color-accent-light)',
              subtle:  'var(--color-accent-subtle)',
            },
            surface: {
              DEFAULT: 'var(--color-surface)',
              hover:   'var(--color-surface-hover)',
            },
          },
        },
      },
    }
  </script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Single central stylesheet -->
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

  <!-- Theme: apply before paint to prevent flash -->
  <script>
    (function() {
      var t = localStorage.getItem('epd-theme');
      if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.classList.remove('light','dark');
      document.documentElement.classList.add(t);
    })();
  </script>
</head>
<body class="font-body bg-primary text-primary transition-colors duration-300 overflow-x-hidden">

  {% include header.html %}

  <main>
    {{ content }}
  </main>

  {% include footer.html %}

  <script src="{{ '/assets/js/theme.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
